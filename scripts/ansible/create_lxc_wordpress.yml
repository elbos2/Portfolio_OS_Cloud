---
# create_lxc_wordpress.yml
# Aanmaken van 3 LXC containers met WordPress voor Klant 1
# Uitvoeren vanaf pve-node1:
#   ansible-playbook scripts/ansible/create_lxc_wordpress.yml -i scripts/ansible/inventory.ini

- name: Kopieer WordPress installatiescript naar alle Proxmox nodes
  hosts: proxmox_nodes
  become: true

  tasks:
    - name: Kopieer install_wordpress.sh naar /tmp op elke node
      copy:
        src: ../bash/install_wordpress.sh
        dest: /tmp/install_wordpress.sh
        mode: '0755'


- name: Maak WordPress LXC containers aan op Proxmox nodes
  hosts: proxmox_nodes
  become: true

  vars:
    template: "local:vztmpl/ubuntu-24.04-standard_24.04-2_amd64.tar.zst"
    storage: "local-lvm"
    memory: 1024
    cores: 1
    disk_size: 8
    bridge: "vmbr0"
    gateway: "10.24.40.1"
    ct_password: "Welkom01x"
    containers:
      - { id: 201, hostname: "wordpress-lxc-1", ip: "10.24.40.31/24", node: "pve-node1" }
      - { id: 202, hostname: "wordpress-lxc-2", ip: "10.24.40.32/24", node: "pve-node2" }
      - { id: 203, hostname: "wordpress-lxc-3", ip: "10.24.40.33/24", node: "pve-node3" }

  tasks:
    - name: Controleer of template aanwezig is
      shell: pveam list local | grep "ubuntu-24.04-standard"
      register: template_check
      ignore_errors: true
      changed_when: false

    - name: Download Ubuntu 24.04 template als niet aanwezig
      shell: |
        pveam update
        pveam download local ubuntu-24.04-standard_24.04-2_amd64.tar.zst
      when: template_check.rc != 0

    - name: Maak LXC container aan
      shell: |
        pct create {{ item.id }} {{ template }} \
          --hostname {{ item.hostname }} \
          --memory {{ memory }} \
          --cores {{ cores }} \
          --rootfs {{ storage }}:{{ disk_size }} \
          --net0 name=eth0,bridge={{ bridge }},ip={{ item.ip }},gw={{ gateway }} \
          --password {{ ct_password }} \
          --unprivileged 1 \
          --features nesting=1 \
          --onboot 1
      args:
        creates: "/etc/pve/lxc/{{ item.id }}.conf"
      loop: "{{ containers }}"
      when: item.node == inventory_hostname

    - name: Start LXC container
      shell: pct start {{ item.id }}
      loop: "{{ containers }}"
      when: item.node == inventory_hostname
      ignore_errors: true

    - name: Wacht tot container volledig opgestart is
      pause:
        seconds: 10

    - name: Stel DNS in container in
      shell: pct exec {{ item.id }} -- bash -c "echo 'nameserver 8.8.8.8' > /etc/resolv.conf"
      loop: "{{ containers }}"
      when: item.node == inventory_hostname

    - name: Kopieer WordPress installatiescript naar container
      shell: pct push {{ item.id }} /tmp/install_wordpress.sh /tmp/install_wordpress.sh
      loop: "{{ containers }}"
      when: item.node == inventory_hostname

    - name: Voer WordPress installatie uit in container
      shell: pct exec {{ item.id }} -- bash /tmp/install_wordpress.sh
      loop: "{{ containers }}"
      when: item.node == inventory_hostname

    - name: Toon WordPress URL per container
      debug:
        msg: "WordPress bereikbaar op: http://{{ item.ip | regex_replace('/.*', '') }}/wordpress"
      loop: "{{ containers }}"
      when: item.node == inventory_hostname
