---
- name: Herinstalleer Docker op alle managers
  hosts: docker_managers
  become: true
  gather_facts: false

  tasks:
    - name: Stop Docker
      ansible.builtin.systemd:
        name: docker
        state: stopped
      ignore_errors: true

    - name: Verwijder alle containers
      ansible.builtin.shell: docker rm -f $(docker ps -aq) 2>/dev/null || true
      changed_when: false

    - name: Verwijder Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: absent
        purge: true

    - name: Verwijder Docker data en config
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/docker
        - /var/lib/containerd
        - /etc/docker

    - name: Installeer benodigde packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - iptables
        state: present
        update_cache: true

    - name: Zet iptables op legacy modus
      ansible.builtin.shell: |
        update-alternatives --set iptables /usr/sbin/iptables-legacy
        update-alternatives --set ip6tables /usr/sbin/ip6tables-legacy
      changed_when: false

    - name: Maak Docker keyrings map aan
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Voeg Docker GPG key toe
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      changed_when: false

    - name: Voeg Docker repository toe
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
        https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
        > /etc/apt/sources.list.d/docker.list
      changed_when: false

    - name: Herstel dpkg indien kapot
      ansible.builtin.shell: |
        dpkg --configure -a
        apt-get install -f -y
      changed_when: false

    - name: Installeer Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Start en enable Docker
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Controleer Docker versie
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Docker versie output
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout }}"

    - name: Test Docker werkt
      ansible.builtin.command: docker run --rm hello-world
      register: hello_world
      changed_when: false

    - name: Test output
      ansible.builtin.debug:
        msg: "{{ hello_world.stdout_lines }}"
