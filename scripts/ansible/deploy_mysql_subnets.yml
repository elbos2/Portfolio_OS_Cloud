---
- name: Deploy MySQL containers in aparte subnetten
  hosts: mgr1
  become: true
  gather_facts: false

  vars:
    compose_dest: /home/ubuntu/mysql-subnets

  tasks:
    # ---- Opruimen --------------------------------------------------------
    - name: Verwijder oude containers
      ansible.builtin.shell: |
        docker rm -f mysql1 mysql2 2>/dev/null || true
      changed_when: false

    - name: Verwijder oude netwerken
      ansible.builtin.shell: |
        docker network rm mysql-subnets_subnet-a mysql-subnets_subnet-b 2>/dev/null || true
      changed_when: false

    # ---- Deploy ----------------------------------------------------------
    - name: Doelmap aanmaken
      ansible.builtin.file:
        path: "{{ compose_dest }}"
        state: directory
        owner: ubuntu
        mode: '0755'

    - name: Docker Compose bestand kopiëren
      ansible.builtin.copy:
        src: ../docker/mysql-subnets/docker-compose.yml
        dest: "{{ compose_dest }}/docker-compose.yml"
        owner: ubuntu
        mode: '0644'

    - name: MySQL containers starten
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ compose_dest }}"

    - name: Wachten tot MySQL1 klaar is (poort 3306)
      ansible.builtin.wait_for:
        port: 3306
        host: 127.0.0.1
        delay: 10
        timeout: 60

    - name: Wachten tot MySQL2 klaar is (poort 3307)
      ansible.builtin.wait_for:
        port: 3307
        host: 127.0.0.1
        delay: 5
        timeout: 60

    # ---- Netwerken tonen ------------------------------------------------
    - name: Docker netwerken tonen
      ansible.builtin.command: docker network ls
      register: network_list
      changed_when: false

    - name: Netwerken output
      ansible.builtin.debug:
        var: network_list.stdout_lines

    # ---- Test bereikbaarheid vanuit host --------------------------------
    - name: Test bereikbaarheid vanuit host - mysql1 (3306)
      ansible.builtin.wait_for:
        port: 3306
        host: 127.0.0.1
        timeout: 10
      register: host_check_mysql1
      ignore_errors: true

    - name: Test bereikbaarheid vanuit host - mysql2 (3307)
      ansible.builtin.wait_for:
        port: 3307
        host: 127.0.0.1
        timeout: 10
      register: host_check_mysql2
      ignore_errors: true

    - name: Resultaat bereikbaarheid vanuit host
      ansible.builtin.debug:
        msg:
          - "mysql1 (poort 3306): {{ 'BEREIKBAAR' if host_check_mysql1 is succeeded else 'NIET BEREIKBAAR' }}"
          - "mysql2 (poort 3307): {{ 'BEREIKBAAR' if host_check_mysql2 is succeeded else 'NIET BEREIKBAAR' }}"

    # ---- Test connectiviteit VOOR fix -----------------------------------
    - name: Test connectiviteit mysql1 -> mysql2 VOOR fix (mysqladmin)
      ansible.builtin.shell: >
        docker exec mysql1 mysqladmin -h 192.168.101.10 -u root -psecret
        --connect-timeout=3 ping 2>/dev/null
        && echo "BEREIKBAAR" || echo "NIET BEREIKBAAR (aparte subnetten)"
      register: result_before_fix
      changed_when: false
      ignore_errors: true

    - name: Connectiviteit VOOR fix
      ansible.builtin.debug:
        msg: "mysql1 -> mysql2: {{ result_before_fix.stdout }}"

    # ---- Fix: verbind mysql1 met subnet-b --------------------------------
    - name: Fix - verwijder eventueel stale endpoint
      ansible.builtin.shell: docker network disconnect mysql-subnets_subnet-b mysql1 2>/dev/null || true
      changed_when: false

    - name: Fix - voeg mysql1 toe aan subnet-b
      ansible.builtin.command: docker network connect mysql-subnets_subnet-b mysql1
      changed_when: true

    - name: Wacht tot netwerk actief is
      ansible.builtin.pause:
        seconds: 3

    # ---- Test connectiviteit NA fix -------------------------------------
    - name: Test connectiviteit mysql1 -> mysql2 NA fix (mysqladmin)
      ansible.builtin.shell: >
        docker exec mysql1 mysqladmin -h 192.168.101.10 -u root -psecret
        --connect-timeout=3 ping 2>/dev/null
        && echo "BEREIKBAAR" || echo "NIET BEREIKBAAR"
      register: result_after_fix
      changed_when: false
      ignore_errors: true

    - name: Connectiviteit NA fix
      ansible.builtin.debug:
        msg: "mysql1 -> mysql2: {{ result_after_fix.stdout }}"

    - name: Test connectiviteit mysql2 -> mysql1 NA fix (mysqladmin)
      ansible.builtin.shell: >
        docker exec mysql2 mysqladmin -h 192.168.100.10 -u root -psecret
        --connect-timeout=3 ping 2>/dev/null
        && echo "BEREIKBAAR" || echo "NIET BEREIKBAAR"
      register: result_mysql2_to_mysql1
      changed_when: false
      ignore_errors: true

    - name: Connectiviteit mysql2 -> mysql1 NA fix
      ansible.builtin.debug:
        msg: "mysql2 -> mysql1: {{ result_mysql2_to_mysql1.stdout }}"

    # ---- Samenvatting ---------------------------------------------------
    - name: Samenvatting
      ansible.builtin.debug:
        msg:
          - "=== SAMENVATTING ==="
          - "mysql1 vanuit host (3306):   {{ 'OK' if host_check_mysql1 is succeeded else 'FAIL' }}"
          - "mysql2 vanuit host (3307):   {{ 'OK' if host_check_mysql2 is succeeded else 'FAIL' }}"
          - "mysql1->mysql2 voor fix:     {{ result_before_fix.stdout }}"
          - "mysql1->mysql2 na fix:       {{ result_after_fix.stdout }}"
          - "mysql2->mysql1 na fix:       {{ result_mysql2_to_mysql1.stdout }}"
