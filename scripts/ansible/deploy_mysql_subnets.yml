---
- name: Deploy MySQL containers in aparte subnetten
  hosts: mgr1
  become: true
  gather_facts: false

  vars:
    compose_dest: /home/ubuntu/mysql-subnets

  tasks:
    - name: Zet iptables op legacy modus
      ansible.builtin.shell: |
        update-alternatives --set iptables /usr/sbin/iptables-legacy 2>/dev/null || true
        update-alternatives --set ip6tables /usr/sbin/ip6tables-legacy 2>/dev/null || true
      changed_when: false

    - name: Verwijder oude Docker netwerken en iptables regels
      ansible.builtin.shell: |
        docker rm -f mysql1 mysql2 2>/dev/null || true
        docker network rm mysql-subnets_subnet-a mysql-subnets_subnet-b 2>/dev/null || true
      changed_when: false

    - name: Herstart Docker om iptables te herladen
      ansible.builtin.systemd:
        name: docker
        state: restarted

    - name: Wacht tot Docker klaar is
      ansible.builtin.wait_for:
        path: /var/run/docker.sock
        timeout: 30

    - name: Doelmap aanmaken
      ansible.builtin.file:
        path: "{{ compose_dest }}"
        state: directory
        owner: ubuntu
        mode: '0755'

    - name: Docker Compose bestand kopiëren
      ansible.builtin.copy:
        src: ../docker/mysql-subnets/docker-compose.yml
        dest: "{{ compose_dest }}/docker-compose.yml"
        owner: ubuntu
        mode: '0644'

    - name: MySQL containers starten
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ compose_dest }}"

    - name: Wachten tot MySQL klaar is
      ansible.builtin.wait_for:
        port: 3306
        host: 127.0.0.1
        delay: 10
        timeout: 60

    - name: Netwerken tonen
      ansible.builtin.command: docker network ls
      register: network_list
      changed_when: false

    - name: Netwerken output
      ansible.builtin.debug:
        var: network_list.stdout_lines

    - name: Bereikbaarheid vanuit host testen
      ansible.builtin.wait_for:
        port: "{{ item.port }}"
        host: 127.0.0.1
        timeout: 10
      register: host_check
      ignore_errors: true
      loop:
        - { name: mysql1, port: 3306 }
        - { name: mysql2, port: 3307 }

    - name: Resultaat bereikbaarheid vanuit host
      ansible.builtin.debug:
        msg: "{{ item.item.name }} ({{ item.item.port }}): {{ 'BEREIKBAAR' if item is succeeded else 'NIET BEREIKBAAR' }}"
      loop: "{{ host_check.results }}"

    - name: Connectiviteit tussen containers testen (verwacht niet bereikbaar)
      ansible.builtin.command: >
        docker exec mysql1 mysqladmin -h 192.168.101.10 -u root -psecret --connect-timeout=3 ping
      register: mysql_result
      ignore_errors: true
      changed_when: false

    - name: Verbinding resultaat voor fix
      ansible.builtin.debug:
        msg: "mysql1 -> mysql2: {{ 'BEREIKBAAR' if mysql_result.rc == 0 else 'NIET BEREIKBAAR (aparte subnetten)' }}"

    - name: Fix toepassen - mysql1 toevoegen aan subnet-b
      ansible.builtin.command: docker network connect mysql-subnets_subnet-b mysql1
      ignore_errors: true
      changed_when: true

    - name: Wacht tot netwerk actief is
      ansible.builtin.pause:
        seconds: 5

    - name: Connectiviteit opnieuw testen na fix (TCP)
      ansible.builtin.command: >
        docker exec mysql1 python3 -c
        "import socket,sys; s=socket.socket(); s.settimeout(5); r=s.connect_ex(('192.168.101.10',3306)); s.close(); print('BEREIKBAAR' if r==0 else 'NIET BEREIKBAAR (code '+str(r)+')'); sys.exit(r)"
      register: mysql_result_after
      ignore_errors: true
      changed_when: false

    - name: Verbinding resultaat na fix
      ansible.builtin.debug:
        msg: "mysql1 -> mysql2: {{ mysql_result_after.stdout }}"
