services:
  mysql1:
    image: mysql:8.0
    container_name: mysql1
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: db1
    networks:
      subnet-a:
        ipv4_address: 192.168.100.10
    ports:
      - "3306:3306"

  mysql2:
    image: mysql:8.0
    container_name: mysql2
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: db2
    networks:
      subnet-b:
        ipv4_address: 192.168.101.10
    ports:
      - "3307:3306"

networks:
  subnet-a:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24

  subnet-b:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.101.0/24
